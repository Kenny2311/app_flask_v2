<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h4>Editar Perfil</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label>Nombre(s)</label>
                    <input type="text" name="nombres" class="form-control" value="{{ usuario.nombres }}" required>
                </div>
                <div class="mb-3">
                    <label>Apellido(s)</label>
                    <input type="text" name="apellidos" class="form-control" value="{{ usuario.apellidos }}" required>
                </div>
                <div class="mb-3">
                    <label>Correo electrónico</label>
                    <input type="email" name="correo" class="form-control" value="{{ usuario.correo }}" required>
                </div>
                <div class="mb-3">
                    <label>Celular</label>
                    <input type="text" name="celular" class="form-control" value="{{ usuario.celular }}" required>
                </div>

                <hr>
                <h5>Cambiar Contraseña</h5>
                <div class="mb-3">
                    <label>Nueva contraseña</label>
                    <input type="password" name="nueva_contraseña" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Confirmar nueva contraseña</label>
                    <input type="password" name="confirmar_contraseña" class="form-control">
                </div>

                <div class="text-end">
                    <a href="{{ url_for('ver_perfil') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
